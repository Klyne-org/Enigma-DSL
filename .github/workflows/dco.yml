name: DCO Check

on:
  pull_request:
    branches: [main]

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: tim-actions/dco@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
