name: Enigma DSL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv pip install ruff --system
      - run: ruff check tests/portable
      - run: ruff format --check tests/portable

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uvx ty check

  test:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          PY_TAG="cp${{ matrix.python-version }}"
          PY_TAG="${PY_TAG//./}"
          LATEST=$(gh release view --repo Klyne-org/Enigma-DSL --json tagName --jq '.tagName')
          gh release download "$LATEST" --repo Klyne-org/Enigma-DSL \
            --pattern "enigma_dsl-*-${PY_TAG}-${PY_TAG}-macosx_14_0_arm64.whl" \
            --dir /tmp/wheels
          pip install /tmp/wheels/*.whl pytest
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Test portable suite
        run: pytest tests/portable -v
